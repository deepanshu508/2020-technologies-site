<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://lucide.dev/logo.light.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2020 Technologies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Helvetica Font Stack */
      body {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #0f172a; /* Fallback */
        color: white;
      }
      
      /* Smooth scrolling */
      html {
        scroll-behavior: smooth;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.4);
      }

      /* Global Atmospheric Background (Twilight Theme) */
      .atmosphere-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -50;
        background: radial-gradient(circle at 50% 0%, #475569 0%, #1e293b 40%, #0f172a 80%, #020617 100%);
      }

      /* Animated Dot Grid - Subtle overlay */
      .dot-grid-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 200%; 
        height: 200%;
        z-index: -49;
        background-image: radial-gradient(circle, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
        background-size: 50px 50px;
        animation: gridPan 120s linear infinite;
        opacity: 0.5;
        pointer-events: none;
      }

      @keyframes gridPan {
        0% { transform: translate(0, 0); }
        100% { transform: translate(-50px, -50px); }
      }

      /* Premium Glass Card (Standard) */
      .glass-panel {
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-top: 1px solid rgba(255, 255, 255, 0.3);
        border-left: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      }
      
      /* Liquid Glass Effect (High Gloss, More Organic) */
      .liquid-glass {
        background: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-top: 1px solid rgba(255, 255, 255, 0.4); /* Strong top highlight */
        border-left: 1px solid rgba(255, 255, 255, 0.2);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 
          0 15px 35px rgba(0, 0, 0, 0.2),
          inset 0 0 30px rgba(255, 255, 255, 0.03); /* Inner glow */
        position: relative;
        overflow: hidden;
      }
      
      .liquid-glass::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 40%;
        background: linear-gradient(to bottom, rgba(255,255,255,0.05), transparent);
        pointer-events: none;
      }

      .glass-pill {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      }

      /* Marquee Animation */
      @keyframes scroll {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      
      .animate-scroll {
        animation: scroll 40s linear infinite;
        width: max-content;
      }
      
      .animate-scroll:hover {
        animation-play-state: paused;
      }

      /* Text Gradients */
      .text-gradient-silver {
        background: linear-gradient(to bottom, #ffffff 0%, #94a3b8 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      /* Typography Tweaks */
      h1, h2, h3, h4, h5, h6 {
        letter-spacing: -0.02em;
      }
      
      .animate-float {
        animation: float 6s ease-in-out infinite;
      }
      
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-20px); }
        100% { transform: translateY(0px); }
      }

    </style>
